description: |
  花白虎 
  (huā bái hǔ)
  Легендарная воительница, известная во всех шести провинциях Империи и за Землями Духов. 
  При рождении получила имя Таомэй в одной из младших ветвей семьи Хуа. Прозвище «Колючка» 
  получила в детстве за острый язычок и решительность в действиях. Связана с духом белого Тигра. 
  В детстве стала единственной выжившей после нападения демона-гуя на её деревню, где погибла 
  её мать Ли Мэйли. Была спасена даосом по имени Вэй, который взял её под своё покровительство 
  и наставил на Путь Малого Совершенствования. Обладает светло-синими глазами и светлыми волосами 
  (проявление силы поровителя духа), что выделяет её среди остальных. Спутница и соратница 
  Ледяного Мечника (Андрея) в его путешествиях по Империи. Мастер боевых искусств и магических техник. 
  
  Характер — решительный, прямолинейный, с обострённым чувством справедливости. Скептически относится 
  к компромиссам, предпочитая действовать напрямую. Играет важную вспомогательную роль в «Лисьих скахках», 
  предоставляя героям поддержку в критических ситуациях.
