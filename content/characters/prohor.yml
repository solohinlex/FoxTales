id: prohor
name: Прохор
aliases:
  - Прохор
story_role:
  - fox_tales: supporting
description: |
  Домовой и хранитель усадьбы Андрея (Ледяного Мечника). Живёт на хуторе 
  за городом, где содержит двор с домашней живностью (куры, козы, собака 
  Печкин). Встаёт рано утром, ворчлив и серьёзен, но по-своему заботлив 
  о тех, кого считает своими. Выполняет распоряжения Андрея, включая 
  присмотр за Алисой в критические моменты. Готовит чай, следит за порядком 
  в доме, выполняет хозяйственные обязанности. Внешне — пожилой мужчина в простой 
  деревенской одежде, с грубыми руками и добрыми глазами. Характер — практичный, 
  немногословный, преданный семье Андрея. Играет важную вспомогательную роль 
  в «Лисьих сказках», предоставляя героям убежище и бытовую поддержку.