description: |
  Девочка-полукровка (лиса-человек), дочь Андрея и Кимико. Учится в обычной школе, где скрывает свою природу от большинства одноклассников. Обладает ярко-рыжими волосами и светлыми глазами, лисьими ушами и хвостом. Характер спокойный, мечтательный, часто смотрит «в никуда» — видит больше, чем другие. Обладает врождённым талантом видеть потустороннее и духов. Может создавать и контролировать ярко-рыжий огонь. Очень проницательна, способна договариваться с животными.