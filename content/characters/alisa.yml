id: alisa
name: Алиса
aliases:
  - Алиса
story_role:
  - fox_tales: protagonist
  - witch_hounting: episode
description: |
  Девочка-полукровка (лиса-человек), возраст от десяти в начале до 
  шестнадцати-восемнадцати в конце повествования. Дочь Андрея и Кимико.
  Является наследницей крови людей, лис и Белой Лошади (через Андрея)
  
  Внешность: ярко-рыжие волосы до плеч, голубые глаза, но в остальном 
  довольно восточная внешность. Худощавое телосложение, практичная одежда.
  
  Характер: любопытная, наблюдательная, с живой хитринкой. Любит слушать
  истории, особенно легенды и сказки. Заботливая — жалеет тех, кто попал
  в беду, даже если это незнакомцы. Может быть прямой до бестактности,
  не понимает социальных условностей. Мечтательная, часто смотрит «в никуда».
  
  Способности: врождённый дар видеть потустороннее и духов. Может создавать
  и контролировать ярко-рыжий огонь. Договаривается с животными (лисы,
  лесные существа). Рисует руны (знает их интуитивно). Обострённые чувства —
  слышит, чует, ощущает больше обычного человека.
  
  Жизнь: учится в обычной школе, где одноклассники считают её странной.
  Живёт в избушке на опушке леса с отцом Андреем и Прохором (дедушка/
  опекун). Отец обучает её правилам человеческого социума.
  
  Отношения: близка с отцом, доверяет ему. Дружит с Прохором (он готовит
  ей травяной чай и угощает). Мать Кимико и тётя Ханако появляются
  эпизодически.
