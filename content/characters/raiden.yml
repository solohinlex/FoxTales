description: |
  Райден — древний демон-лис (кицунэ), второй сын Тамамо и Томоэ. 
  Обладает значительной магической силой, способен подчинять других 
  духов и демонов меньшего ранга (включая домовых вроде Профессора). 
  Мастер манипуляций и интриг, действует хитро и расчётливо. 
  Внешне — привлекательный мужчина с лисьими чертами (острые глаза, 
  хитрая улыбка), носит дорогие часы и перчатки. Характер — холодный, циничный, 
  безжалостный к тем, кто стоит у него на пути. 

  На Райдена проклятье Белой Лошади подействовало сильнее всего. Он начал получать
  удовольствие от манипуляций и убийства людей.
  
  Способен призывать магический огонь и тень, использовать иллюзии и ментальные 
  техники. Играет роль ключевого антагониста в «Охоте на ведьму», представляя 
  прямую угрозу главным героям.