description: |
  Тетсуо — древний воин, обращённый Тамамо-но-Маэ в совершенный меч Кусанаги-но цуруги.
  В прошлом — молодой воин из далёкой страны, влюблённый в девушку по имени Мизуки. 
  Чтобы завоевать её руку, прошёл три этапа совершенствования: овладел мечом в руке 
  (мастерство техники), познал меч в сердце (внутренняя сила) и опустошил сердце 
  (отказ от всех эмоций). Превращён в меч Тамамо для сражения с Белой Лошадью. В нынешней 
  форме — простой прямой меч около метра длиной, без украшений, завёрнутый в плотную ткань. 
  Вызывает непреодолимый страх смерти у любого, кто пытается коснуться его рукояти. Хранится 
  в сундуке с другими реликвиями. Характер — безэмоциональный, пустой, лишённый желаний 
  и привязанностей. Играет важную символическую роль в «Лисьих сказках», представляя тему 
  жертвенности, цены совершенства и утраты человечности. Упоминается в первой главе 
  как часть легенды, рассказанной Алисе.

  После того, как Андрей вытащил его из черепа Белой Лошади, Тетсуо периодически появляется
  в человеческой форме, при этом он выглядит, как молодой восточной внешности человек, одетый
  в традиционные одежды (ханьфу), утончённый, благородный и безэмоциональный.