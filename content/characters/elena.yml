id: elena
name: Елена
aliases:
  - Елена
  - Лена
story_role:
  - witch_hounting: supporting
description: |
  Ближайшая подруга Евы, неизменно поддерживающая её в трудные моменты 
  и помогающая советом и делом. Романтическая партнёрша Александра, 
  происходит из знатного аристократического рода, что даёт ей доступ 
  к ресурсам и связям в высшем обществе. Известна своей преданностью 
  друзьям и готовностью прийти на помощь. Играет важную вспомогательную 
  роль в «Охоте на ведьму».

  Пострадала от выплеска неконтролируемой силы Евы во время магического
  ритуала на даче Елены