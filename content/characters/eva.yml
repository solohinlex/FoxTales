id: eva
name: Ева
aliases:
  - Ева
story_role:
  - witch_hounting: protagonist
description: |
  Главная героиня «Охоты на ведьму». Молодая студентка, работающая ночными 
  сменами официанткой, чтобы оплатить учёбу. Сирота, выросшая без родителей. 
  Обладает врождённым магическим даром, который проявляется через связь 
  с таинственной сущностью — Чёрным человеком, спасшим ей жизнь в детстве 
  во время автомобильной катастрофы. Страдает от повторяющихся кошмаров 
  о гибели родителей и видит монстра (того самого Чёрного человека), 
  которого больше никто не замечает. 
  
  Внешность: каштановые волосы средней длины, бледный вид от переутомления и стресса.

  Завидует Елене, в чём не признаётся даже себе.
  Засматривается на Дэна, не зная, что тот на самом деле кицунэ, питающийся силой ведьм.
  
  На старте не знает о своей силе и вообще о магической стороне мира. 
  Её внутренняя арка — поиск ответа на вопрос: кто она на самом деле 
  и как жить с даром, который другие считают проклятием.