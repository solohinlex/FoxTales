id: black_man
name: Черный человек
aliases:
  - Черный человек
story_role:
  - witch_hounting: antagonist
description: |
  Преследующий Еву демон, который появляется в её снах и постепенно проникает в реальность.
  Является воплощением её непроявленной силы.
  
  Внешность: тёмная гуманоидная фигура, почти сливающаяся с тенями. Лица нет — лишь глубокая пустота.
  Руки неестественно длинные и ломкие, напоминающие лапки насекомого. Двигается бесшумно, может появляться
  и исчезать в отражениях и зеркальных поверхностях.
  
  Характер: молчалив, наблюдателен, действует через намёки и указания. Не атакует напрямую —
  вместо этого давит психологически, усиливая страхи и сомнения Евы.
  
  Связь с Евой: чем сильнее она подавляет свою силу, тем явственнее становится Черный человек.
  Его появление — знак того, что сила требует выхода.