description: |
  Древнейший и могущественнейших дух, супруг Тамамо-но-Маэ, отец Ханако, Райдена и Кимико, 
  дед Алисы. Обладает всего одним хвостом, но для его уровня это ничего не значит. 
  Внешне — невзрачный, нелепо пухленький мужчина с отрешённой улыбкой мечтателя. Почти никогда
  не смотрит прямо на собеседника, что связано с его силой.
  
  Носит просторное хаори, надетое прямо на голое тело. Характер — рассеянный, погружённый 
  в свои мысли, кажется глуповатым, но на самом деле обладает глубочайшей мудростью. 
  Занимается магическим письмом — создаёт заклятья, водя кистью над листом. Говорит мало, 
  но каждое слово весомо. Обладает способностью говорить со смертью и предвидеть судьбу. 
  Его ключевая сила - управление удачей и неудачей. Горе тому, к кому он придёт или на кого взглянет.

  В ключевые моменты проявляет проницательность — говорит с самой смертью Андрея, 
  предсказывает его будущее. Относится к семье с нежностью, шутит с дочерью Кимико, 
  называет её «милая». Играет важную вспомогательную роль в «Лисьих сказках», выступая 
  как носитель древней мудрости и проводник воли судьбы.

  Единственный известный в Нефритовой Империи адепт Пути Великого Совершенствования - исихии.