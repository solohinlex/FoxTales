id: aleksandr
name: Александр
aliases:
  - Александр
story_role:
  - witch_hounting: protagonist
description: |
  Сотрудник Института (спецслужбы по противодействию сверхъестественному). 
  Выглядит как мужчина в расцвете сил в сером деловом костюме, с тёмными глазами 
  и осанкой офицера. Голос низкий, звучный.
  
  Характер: методичный, дисциплинированный, вежливый но может быть резким. 
  Заботится о девушке Лене, хотя иногда раздражается её навязчивостью. 
  Недавно бросил курить, но пачка всё ещё в кармане. Любит крепкий кофе.
  
  Способности: внутри него живёт «зверь» — древняя сущность, которая обостряет 
  его чувства. Может чувствовать запах страха, различать эмоции по запаху. 
  Рефлексы и инстинкты работают на сверхчеловеческом уровне.
  
  Отношения: встречается с Леной (студентка из хорошей семьи). Расследует дело 
  погибшей Насти. Работает с монсеньором Себастианом («Охотник») из Италии. 
  Начальник — Владимир Петрович.