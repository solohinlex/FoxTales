description: |
  Итальянский специалист по особым случаям, связанным с потусторонними силами.
  Прибыл из Италии по приглашению Владимира Петровича для помощи в расследовании 
  дел о ведьмах. Известен под прозвищем «Охотник». Внешне — мужчина средних лет 
  с хищным орлиным профилем, серыми суровыми глазами и холодной манерой держаться. 
  Носит тёмную длинную одежду с белым воротничком, на груди — серебряный латинский 
  крест, символизирующий его статус и защиту. Говорит по-русски чисто, но с заметным 
  иностранным акцентом. Характер — сдержанный, профессиональный, иногда высокомерный, 
  но преданный своему делу. Обладает глубокими знаниями о ведьмах, их природе 
  и поведении. Способен чувствовать присутствие магических существ по запаху. Исповедует 
  католицизм, часто бормочет молитвы на латыни в напряжённых ситуациях. Играет важную 
  вспомогательную роль в «Охоте на ведьму», выступая наставником Александра и проводником 
  в мире охоты на ведьм. Погибает от рук Евы, когда та принимает свою силу. 
  Его серебряный крест переходит к Александру как символ преемственности.

  Охотник - это особое звание и особая роль в магическом мире, он обладает властью над проявлением
  магических сил, но только до тех пор, пока сохраняет роль нелицеприятного судьи. Себастиан
  в какой-то момент переступает черту, решив, что Еву нужно устранить, несмотря на то, что на
  тот момент, она ещё не совершила никакого преступления. После чего теряет защиту, погибает
  от рук Евы и роль Охотника переходит к Александру