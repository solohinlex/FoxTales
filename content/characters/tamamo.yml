  - Божественная лиса
story_role:
  - fox_tales: supporting
description: |
  Тамамо-но-Маэ — Великая Девятихвостая Лиса, одна из древнейших и могущественнейших кицунэ. 
  Мать Ханако, Райдена и Кимико, бабушка Алисы. Супруга Божественного Северного Лиса 
  господина Томоэ. Обладает девятью разноцветными хвостами — высший признак силы и мудрости 
  для кицунэ. Внешне — зрелая женщина с совершенной, уверенной красотой «гор в туманном рассвете». 
  Носит традиционное кимоно, расшитое шёлком, с широким поясом-бантом. В руке держит веер, 
  который использует для жестов и ритуалов. Характер — мудрый, спокойный, благожелательный, 
  но с скрытой глубиной силы. Основательница Пути Малого Совершенствования — магической традиции, 
  связанной с ритуалами и заклинаниями. Живёт в Лисьей Деревне, в просторной усадьбе со слугами. 
  Относится к людям с осторожным интересом, понимает опасность связей между мирами, но не препятствует 
  им открыто. Использует Гадательную Машину (восьмигранный цилиндр с триграммами) для вопрошания судьбы. 
  Играет важную вспомогательную роль в «Лисьих сказках», выступая как хранительница древних знаний 
  и традиций лисьего рода. Испытывает тревогу за судьбу Андрея и Кимико, понимая глубинные последствия 
  их союза.

  Создала из Тетсуо совершенный меч, с помощью которого надолго запечатала Балую Лошадь. Однако в резуальтате
  на её семью пало проклятье Белой Лошади, теперь кицунэ обречены приносить гибель любимым, либо погибунть
  самим.