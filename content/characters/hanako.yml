description: |
  Старшая сестра Кимико, древняя кицунэ с тремя хвостами. 
  В человеческом мире известна как Ханна Томоевна — учительница 
  истории в школе, ведущая факультатив по мистическим практикам 
  народов мира. Обладает тёмно-медными волосами и светлыми глазами 
  с японскими чертами лица. Мастерски владеет магией крови, ритуалами 
  и заклинаниями. Носит белоснежную рубашку и красную юбку, напоминающую 
  одежду японских жриц. Способна призывать холодный свет и управлять тьмой. 
  Хитра, расчётлива, но проявляет неожиданную заботу о тех, кого считает 
  своими. Скептически относится к людям, но готова сотрудничать ради своих целей. 
  
  Вынужденно смирилась с проклятьем Белой Лошади и обрекает своих человеческих
  возлюбленных на смерть.

  Играет роль антагониста в «Лисьих сказках», манипулируя событиями из тени.
  Её цель - вернуть к жизни Кимико.
