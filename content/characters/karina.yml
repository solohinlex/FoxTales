id: karina
name: Карина
aliases:
  - Карина
story_role:
  - fox_tales: supporting
description: |
  Ближайшая подруга Алисы с младших классов школы. Происходит из знатного 
  аристократического рода — ездит на автомобиле с водителем, носит позолоченный 
  крестик на серебряной цепочке. Дочь Владимира Петровича (руководителя института, 
  в котором работает Александр из «Охоты на ведьму»). Имеет старшего брата, 
  который глубоко религиозен (возможно является Литератором, пока под вопросом). 
  Племянница по материнской линии — у неё есть пропавший племянник Вася, 
  которого она помогла найти с помощью магического ритуала. Обладает внушительной 
  репутацией в школе, что отпугивает потенциальных обидчиков. Решительная, 
  прямолинейная, готова на риск ради близких — согласилась на ритуал с кровью ради 
  поиска Васи. В критических ситуациях проявляет неожиданную смелость и напористость. 
  Скептически относилась к магии до тех пор, пока не столкнулась с ней лично. 
  После событий с духом сна начала серьёзное обучение магическим практикам под 
  руководством Ханны Томоевны. Играет важную вспомогательную роль в «Лисьих сказках», 
  представляя связь между обычным миром и потусторонним.

  Любовный интерес Тетсуо.