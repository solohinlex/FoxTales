description: |
  Возлюбленный Кимико и отец Алисы. В Империи известен под прозвищем 
  «Ледяной Мечник» благодрая связи с силами Тетсуо и Белой Лошади, 
  дальним потомком которой он является. Носит титул Хранителя - посредника 
  и защитника во воимоотношенияхъ духов и людей в Северных землях. 
  Его связь с Кимико и дочерью Алисой — центральный элемент его мотивации. 
  Появляется как главный герой в «Лисьих сказках» и эпизодически 
  в «Охоте на ведьму».

  Долгое время не мог пробудить силу, так как в нём была сильна кровь Белой Лошади
  и прочие духи опасались с ним связываться. Но после событий "Истории о мече в черепе"
  смог получить доступ к силам Тетсуо и Белой Лошади.