description: |
  Разумник Яковлевич — доктор исторических наук, действительный профессор 
  Императорского Университета, уважаемый учёный с безупречной репутацией. 
  В действительности — древний домовой дух, хранитель университетского здания 
  и его тайн. Обладает глубокими знаниями истории, магии и потусторонних существ. 
  Вынужден подчиняться Райдену из-за лисьей природы последнего, что создаёт 
  внутренний конфликт между долгом и совестью. Тайно помогает Еве, рискуя безопасностью — 
  предупреждает об опасности, защищает от преследования, передаёт информацию Александру. 
  Внешне — пожилой мужчина в академической одежде, с седыми волосами и проницательным взглядом. 
  Характер — мудрый, осторожный, но способный на решительные поступки ради справедливости. 
  Играет важную вспомогательную роль в «Охоте на ведьму», выступая связующим звеном между 
  академическим миром и потусторонними силами.