story_role:
  - fox_tales: supporting
description: |
  Младшая сестра Ханако, древняя кицунэ с двумя хвостами — признак её возраста и силы, 
  уступающей старшей сестре. В человеческом мире живёт под именем Кимико, носит 
  традиционную японскую одежду (сложносочинённое кимоно, деревянную обувь гэта). 
  Обладает игривым, мечтательным характером, искренне любит людей и доверяет им. 
  Возлюбленная Андрея (Ледяного Мечника), от которого родила дочь Алису (умерла при родах). 
  Проявляет заботу о близких — помогает Андрею готовиться к событиям, поправляет его одежду, 
  сопровождает в путешествиях. Защитница семьи — готова проявить решительность ради 
  безопасности близких. В детстве пережила конфликт с сестрой Ханако из-за спрятанной 
  игрушки, что сформировало её отношение к доверию и привязанностям. Играет важную 
  вспомогательную роль в «Лисьих сказках», связывая человеческий и духовный миры через 
  свои отношения с Андреем.