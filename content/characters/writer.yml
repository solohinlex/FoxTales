description: |
  Летописец — мета-персонаж, буквальный автор и создатель всех историй во вселенной Лисьих сказок. 
  Существует одновременно внутри и вне повествования. Периодически проявляется непосредственно 
  в текстах, вмешиваясь в ход событий или комментируя происходящее. Обладает абсолютным знанием 
  о всех персонажах, их мыслях, мотивах и судьбах. Способен изменять ход повествования, 
  создавать новые миры и удалять существующие.
  
  Ключевая особенность: Белая Лошадь Тамамо-но-Маэ и Томоэ являются проявлениями разных сторон 
  личности Летописца:

  Белая Лошадь — воплощение холодной, разрушительной сторны
  Тамамо — воплощение мудрости, созидания и материнского начала
  Томоэ — воплощение созерцательности, отстранённой мудрости и связи с судьбой
