description: |
  Коллега и друг Александра. Сотрудник лаборатории Университета, увлекается математикой 
  и компьютерами (любил треугольник Серпинского на экранах мониторов). Внешне — молодой 
  человек, работает в лабораторных условиях. Характер — спокойный, преданный делу, 
  готовый работать допоздна. Стал второй жертвой за месяц в организации — найден 
  мёртвым в лаборатории с пустым шприцем и ампулой рядом. Погиб от рук Райдена, который
  пришел забрать Еву из Института. Его смерть стала поворотным моментом для Александра, 
  усилившим его решимость найти Еву. Играет эпизодическую, но важную роль в «Охоте на ведьму», 
  демонстрируя реальную опасность Райдена.