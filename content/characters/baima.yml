description: |
  白马主母
  Бай Ма Чжу Му (bái mǎ zhǔ mǔ)
  Древнейший и могущественнейший демон, основательница
  Пути Демонического Совершенствования. Известна под титулами 
  «Белая Лошадь», «Госпожа Байма» и «Хозяйка Мёртвого Снега». 
  Обладает колоссальной магической силой, связанной со льдом, 
  смертью и тьмой. Её мотивация — конфликт с Летописцем.

  Белая Лошадь является воплощением тёмной стороны души Летописца, его
  скрытых желаний и подавленных эмоций. В какой-то момент она решила, что
  мир, созданный Летописцем должен быть разрушен и начала дейстововать против
  него. Не может быть окончательно уничтожена, так как является частью Летописца.

  Долгое время была заперта с помощью силы Тетсуо, но в "Истории о мече в черепе" Андрей,
  благодрая связи с её кровью, случайно её освобождает.
  
  Главный антагонист в «Лисьих Сказках», её протвостояние с Летописцем и лисами является
  основным конфликтом сюжета.