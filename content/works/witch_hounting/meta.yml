id: witch_hounting
title: Охота на ведьму
status: in_progress
created_at: 2025-01-01
updated_at: 2026-01-24
description: |
  Ева обнаруживает, что её преследует таинственный монстр. Но на самом ли деле это монстр? Или это всего лишь её воображение?
tags:
  - фэнтези
  - триллер
  - лисы

characters:
  - eva
  - aleksandr
  - elena
  - hanako
  - raiden
  - sebastian
  - professor
  - black_man
  - sasha
  - andrey
  - alisa
  - prohor
  - vladimir_petrovich

chapters:
  - id: chapter_01
    file: chapters/chapter_01.md
    title: Глава 1
    description: |
      Александр прибывает на место преступления в многоквартирном доме, где погибли его знакомая Настя 
      и ещё один человек. В квартире он встречает монсеньора Себастиана — итальянского специалиста по 
      «особым случаям». Они будут работать вместе над этим делом.
    characters:
      - aleksandr
      - sebastian
      - vladimir_petrovich
  - id: chapter_02
    file: chapters/chapter_02.md
    title: Глава 2
    description: |
      Еве снится кошмар о гибели родителей в автокатастрофе и странном безликом существе. На лекции 
      она замечает среди студентов парня с неестественно длинными руками, который оказывается Дэном. 
      Подруга Лена приглашает Еву на вечеринку.
    characters:
      - eva
      - elena
  - id: chapter_03
    file: chapters/chapter_03.md
    title: Глава 3
    description: |
      Александр разбирает документы погибшей Насти, пытаясь понять, что её погубило. В разговоре 
      с коллегой Сашей он узнаёт, что в их работе опасны даже безобидные привычки, и решает проверить 
      версию о мужчине в жизни Насти.
    characters:
      - aleksandr
      - sasha
  - id: chapter_04
    file: chapters/chapter_04.md
    title: Глава 4
    description: |
      Ева работает официанткой и начинает видеть галлюцинации — столик за пальмой, которого нет. 
      Она встречает Александра и Лену в ресторане. Александр замечает, что Ева пахнет страхом.
    characters:
      - eva
      - aleksandr
      - elena
  - id: chapter_05
    file: chapters/chapter_05.md
    title: Глава 5
    description: |
      Александр и монсеньор Себастиан едут за город к Хранителю — отшельнику, живущему в лесу. 
      Там они встречают его дочь Алису и через зеркало связываются с Ханако-сан, которая передаёт 
      им перстень для заточения демона.
    characters:
      - aleksandr
      - sebastian
      - andrey
      - alisa
      - prohor
  - id: chapter_06
    file: chapters/chapter_06.md
    title: Глава 6
    description: |
      Александр и монсеньор присутствуют при ритуале общения через зеркало с Ханако-сан. Она передаёт 
      им перстень для заточения демона, объясняя, что преступник объявлен демоном и лишён покровительства.
    characters:
      - aleksandr
      - sebastian
      - andrey
      - hanako
  - id: chapter_07
    file: chapters/chapter_07.md
    title: Глава 7
    description: |
      Компания едет на дачу к Лене. Ева рассказывает подруге о своих страхах и странных видениях. 
      Лена предлагает познакомить Еву с Александром и Дэном поближе.
    characters:
      - eva
      - aleksandr
      - elena
      - raiden
  - id: chapter_08
    file: chapters/chapter_08.md
    title: Глава 8
    description: |
      На даче все готовят шашлыки и обедают. Дэн рассказывает о Нефритовой Империи и её традициях. 
      Ева чувствует себя неловко, но постепенно расслабляется.
    characters:
      - eva
      - aleksandr
      - elena
      - raiden
  - id: chapter_09
    file: chapters/chapter_09.md
    title: Глава 9
    description: |
      За обедом Ева наконец рассказывает о своих кошмарах и преследующем её существе. Александр 
      понимает, что это связано со временем гибели Насти. Дэн предлагает провести ритуал 
      для выявления проблемы.
    characters:
      - eva
      - aleksandr
      - elena
      - raiden
  - id: chapter_10
    file: chapters/chapter_10.md
    title: Глава 10
    description: |
      Дэн проводит ритуал с зеркалом. В отражении появляется чёрное безликое существо, нападающее 
      на Лену. Дэн сражается с ним огненными хвостами, велит всем бежать.
    characters:
      - eva
      - aleksandr
      - elena
      - raiden
      - black_man
  - id: chapter_11
    file: chapters/chapter_11.md
    title: Глава 11
    description: |
      Александр везёт Лену в больницу, Ева с ним. После звонка Дэна Александр связывается с монсеньором, 
      который требует привезти Еву в безопасное место — она может быть в опасности.
    characters:
      - eva
      - aleksandr
      - sebastian
  - id: chapter_12
    file: chapters/chapter_12.md
    title: Глава 12
    description: |
      Александр привозит Еву в институт, оставляет её с коллегой Сашей. Тот угощает её чаем и булочкой, 
      расспрашивает о случившемся. Ева засыпает от успокоительного.
    characters:
      - eva
      - sashа
  - id: chapter_13
    file: chapters/chapter_13.md
    title: Глава 13
    description: |
      Ева просыпается ночью и слышит разговор Саши по телефону. В её голове появляется голос Дэна, 
      предупреждающий об опасности. Саша делает ей укол, и Ева теряет сознание.
    characters:
      - eva
      - sashа
      - raiden
  - id: chapter_14
    file: chapters/chapter_14.md
    title: Глава 14
    description: |
      Александр и монсеньор возвращаются в институт. Они находят Сашу мёртвым, а Ева исчезла. Александр 
      звонит ей, и телефон звонит под диваном — Ева сбежала.
    characters:
      - aleksandr
      - sebastian
  - id: chapter_15
    file: chapters/chapter_15.md
    title: Глава 15
    description: |
      Ева просыпается в деревянном доме профессора Разумника Яковлевича. Дэн приносит чай и объясняет, 
      что организация Александра считала её опасной. Они будут разбираться, почему.
    characters:
      - eva
      - raiden
      - professor
  - id: chapter_16
    file: chapters/chapter_16.md
    title: Глава 16
    description: |
      Ева узнаёт о мистических практиках Нефритовой Империи. Она начинает видеть тёмную фигуру 
      в зеркале. Профессор и Дэн намекают, что с ней происходит что-то необычное.
    characters:
      - eva
      - raiden
      - professor
  - id: chapter_17
    file: chapters/chapter_17.md
    title: Глава 17
    description: |
      Во время практического исследования Ева решает, что Черный виновен в гибели её родителей. Она боится магии, но Дэн её утешает.
    characters:
      - eva
      - professor
  - id: chapter_18
    file: chapters/chapter_18.md
    title: Глава 18
    description: |
      Ева утром общается с Профессором о древних путях и силах, которые могут пробудиться в человеке.
    characters:
      - eva
      - professor
  - id: chapter_19
    file: chapters/chapter_19.md
    title: Глава 19
    description: |
      Профессор оказывается предателем. Дэн раскрывается как маньяк, стоящий за событиями.
    characters:
      - eva
      - professor
      - raiden
  - id: chapter_20
    file: chapters/chapter_20.md
    title: Глава 20
    description: |
      Дэн убивает Профессора и пытается уговорить Еву пойти с ним, принять свою силу.
    characters:
      - eva
      - professor
      - raiden
  - id: chapter_21
    file: chapters/chapter_21.md
    title: Глава 21
    description: |
      Александр и Охотник врываются в дом. После схватки Дэн побеждён.
    characters:
      - eva
      - raiden
      - aleksandr
      - sebastian
  - id: chapter_22
    file: chapters/chapter_22.md
    title: Глава 22
    description: |
      Ева принимает свою силу и убивает Охотника. Александр берёт крест Охотника и заточает Дэна.
    characters:
      - eva
      - raiden
      - aleksandr
      - sebastian
  - id: chapter_23
    file: chapters/chapter_23.md
    title: Глава 23
    description: |
      В разгромленном доме Александр обещает Еве помочь разобраться с её новой силой и контролировать её.
    characters:
      - eva
      - aleksandr