id: fox_tales
title: Лисьи сказки
status: in_progress
created_at: 2021-03-10
updated_at: 2025-06-28
description: "Эти истории о волшебстве. И о том, как волшебство приходит в обыденный мир и меняет его. И о лисах конечно."
tags:
  - сказки
  - фэнтези
  - волшебство
  - лисы

characters:
  - andrey
  - alisa
  - kimiko
